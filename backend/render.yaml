services:
  - type: web
    name: acoustic-comms-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
